<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="csGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="csGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="csBg" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <circle cx="100" cy="80" r="65" fill="url(#csBg)"/>
  <g filter="url(#csGlow)">
    <!-- Central origin node -->
    <circle cx="100" cy="36" r="7" fill="#C9A227" opacity="0.95"/>
    <!-- First order ripple ring -->
    <circle cx="100" cy="36" r="18" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.4"/>
    <!-- Branch lines from origin -->
    <line x1="100" y1="43" x2="68" y2="72" stroke="#C9A227" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="43" x2="100" y2="75" stroke="#C9A227" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="43" x2="132" y2="72" stroke="#C9A227" stroke-width="1.5" opacity="0.7"/>
    <!-- Second order nodes -->
    <circle cx="68" cy="72" r="5.5" fill="#C9A227" opacity="0.8"/>
    <circle cx="100" cy="75" r="5.5" fill="#C9A227" opacity="0.8"/>
    <circle cx="132" cy="72" r="5.5" fill="#C9A227" opacity="0.8"/>
    <!-- Second order ripple -->
    <circle cx="100" cy="72" r="38" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.25"/>
    <!-- Third order branches (left cluster) -->
    <line x1="68" y1="77" x2="42" y2="108" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <line x1="68" y1="77" x2="62" y2="112" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <line x1="68" y1="77" x2="82" y2="110" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <!-- Third order branches (center cluster) -->
    <line x1="100" y1="80" x2="92" y2="114" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <line x1="100" y1="80" x2="108" y2="114" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <!-- Third order branches (right cluster) -->
    <line x1="132" y1="77" x2="118" y2="110" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <line x1="132" y1="77" x2="138" y2="112" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <line x1="132" y1="77" x2="158" y2="108" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <!-- Third order nodes -->
    <circle cx="42" cy="108" r="4" fill="#C9A227" opacity="0.55"/>
    <circle cx="62" cy="112" r="4" fill="#C9A227" opacity="0.55"/>
    <circle cx="82" cy="110" r="4" fill="#C9A227" opacity="0.55"/>
    <circle cx="92" cy="114" r="4" fill="#C9A227" opacity="0.55"/>
    <circle cx="108" cy="114" r="4" fill="#C9A227" opacity="0.55"/>
    <circle cx="118" cy="110" r="4" fill="#C9A227" opacity="0.55"/>
    <circle cx="138" cy="112" r="4" fill="#C9A227" opacity="0.55"/>
    <circle cx="158" cy="108" r="4" fill="#C9A227" opacity="0.55"/>
    <!-- Third order ripple -->
    <circle cx="100" cy="108" r="62" fill="none" stroke="#C9A227" stroke-width="0.6" opacity="0.15"/>
    <!-- Fourth order fading dots -->
    <circle cx="30" cy="132" r="2.5" fill="#C9A227" opacity="0.3"/>
    <circle cx="48" cy="136" r="2" fill="#C9A227" opacity="0.25"/>
    <circle cx="72" cy="138" r="2.5" fill="#C9A227" opacity="0.3"/>
    <circle cx="88" cy="140" r="2" fill="#C9A227" opacity="0.25"/>
    <circle cx="112" cy="140" r="2" fill="#C9A227" opacity="0.25"/>
    <circle cx="128" cy="138" r="2.5" fill="#C9A227" opacity="0.3"/>
    <circle cx="152" cy="136" r="2" fill="#C9A227" opacity="0.25"/>
    <circle cx="170" cy="132" r="2.5" fill="#C9A227" opacity="0.3"/>
  </g>
  <!-- Order labels -->
  <text x="170" y="42" font-family="'JetBrains Mono', monospace" font-size="6" fill="#C9A227" opacity="0.4">1st</text>
  <text x="170" y="78" font-family="'JetBrains Mono', monospace" font-size="6" fill="#C9A227" opacity="0.3">2nd</text>
  <text x="170" y="116" font-family="'JetBrains Mono', monospace" font-size="6" fill="#C9A227" opacity="0.2">3rd</text>
  <!-- Label -->
  <text x="100" y="170" font-family="Georgia, serif" font-size="10" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">CENDIACASCADE</text>
</svg>
