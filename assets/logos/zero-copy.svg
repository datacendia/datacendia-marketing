<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="zcGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="zcGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="zcBg" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <circle cx="100" cy="90" r="65" fill="url(#zcBg)"/>
  <g filter="url(#zcGlow)">
    <!-- Database cylinder -->
    <ellipse cx="100" cy="55" rx="40" ry="12" fill="none" stroke="url(#zcGold)" stroke-width="2" opacity="0.8"/>
    <line x1="60" y1="55" x2="60" y2="110" stroke="url(#zcGold)" stroke-width="2" opacity="0.6"/>
    <line x1="140" y1="55" x2="140" y2="110" stroke="url(#zcGold)" stroke-width="2" opacity="0.6"/>
    <ellipse cx="100" cy="110" rx="40" ry="12" fill="none" stroke="url(#zcGold)" stroke-width="2" opacity="0.7"/>
    <!-- Internal disk lines -->
    <ellipse cx="100" cy="72" rx="40" ry="10" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.25"/>
    <ellipse cx="100" cy="90" rx="40" ry="10" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.25"/>
    <!-- Lock icon on database (data stays put) -->
    <rect x="94" y="78" width="12" height="10" rx="2" fill="none" stroke="#E8C840" stroke-width="1.5" opacity="0.8"/>
    <path d="M96 78 L96 74 Q96 70 100 70 Q104 70 104 74 L104 78" fill="none" stroke="#E8C840" stroke-width="1.5" opacity="0.8"/>
    <circle cx="100" cy="83" r="1.5" fill="#E8C840" opacity="0.9"/>
    <!-- Query arrow going in (not data moving out) -->
    <path d="M48 130 Q48 125 60 118" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.5" marker-end="none"/>
    <path d="M55 115 L60 118 L55 122" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <!-- Query arrow right side -->
    <path d="M152 130 Q152 125 140 118" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.5"/>
    <path d="M145 115 L140 118 L145 122" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.5"/>
    <!-- "No copy" symbol — circle with line through copy icon -->
    <circle cx="100" cy="140" r="14" fill="none" stroke="#A07B1A" stroke-width="1.5" opacity="0.45"/>
    <line x1="90" y1="150" x2="110" y2="130" stroke="#A07B1A" stroke-width="1.5" opacity="0.45"/>
    <!-- Tiny document icon inside the prohibition -->
    <rect x="95" y="134" width="10" height="12" rx="1" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.4"/>
    <path d="M101 134 L101 137 L105 137" fill="none" stroke="#C9A227" stroke-width="0.6" opacity="0.3"/>
  </g>
  <!-- Label -->
  <text x="100" y="176" font-family="Georgia, serif" font-size="10" fill="#C9A227" text-anchor="middle" letter-spacing="0.06em" opacity="0.9">ZERO-COPY</text>
</svg>
