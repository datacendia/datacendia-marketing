<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="cGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cPillar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="cSoft">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <!-- Central glow -->
  <circle cx="100" cy="100" r="60" fill="url(#cGlow)"/>
  <!-- Connection lines from pillars to center -->
  <g stroke="#C9A227" stroke-opacity="0.25" stroke-width="1">
    <line x1="100" y1="45" x2="100" y2="100"/>
    <line x1="147.6" y1="72.5" x2="100" y2="100"/>
    <line x1="147.6" y1="127.5" x2="100" y2="100"/>
    <line x1="100" y1="155" x2="100" y2="100"/>
    <line x1="52.4" y1="127.5" x2="100" y2="100"/>
    <line x1="52.4" y1="72.5" x2="100" y2="100"/>
  </g>
  <!-- Six pillars arranged in a circle (top-down view = circles) -->
  <g filter="url(#cSoft)">
    <!-- Pillar 1 (top) -->
    <circle cx="100" cy="45" r="10" fill="none" stroke="url(#cPillar)" stroke-width="2.5"/>
    <circle cx="100" cy="45" r="4" fill="#C9A227" opacity="0.7"/>
    <!-- Pillar 2 (top-right) -->
    <circle cx="147.6" cy="72.5" r="10" fill="none" stroke="url(#cPillar)" stroke-width="2.5"/>
    <circle cx="147.6" cy="72.5" r="4" fill="#C9A227" opacity="0.7"/>
    <!-- Pillar 3 (bottom-right) -->
    <circle cx="147.6" cy="127.5" r="10" fill="none" stroke="url(#cPillar)" stroke-width="2.5"/>
    <circle cx="147.6" cy="127.5" r="4" fill="#C9A227" opacity="0.7"/>
    <!-- Pillar 4 (bottom) -->
    <circle cx="100" cy="155" r="10" fill="none" stroke="url(#cPillar)" stroke-width="2.5"/>
    <circle cx="100" cy="155" r="4" fill="#C9A227" opacity="0.7"/>
    <!-- Pillar 5 (bottom-left) -->
    <circle cx="52.4" cy="127.5" r="10" fill="none" stroke="url(#cPillar)" stroke-width="2.5"/>
    <circle cx="52.4" cy="127.5" r="4" fill="#C9A227" opacity="0.7"/>
    <!-- Pillar 6 (top-left) -->
    <circle cx="52.4" cy="72.5" r="10" fill="none" stroke="url(#cPillar)" stroke-width="2.5"/>
    <circle cx="52.4" cy="72.5" r="4" fill="#C9A227" opacity="0.7"/>
  </g>
  <!-- Outer ring connecting pillars -->
  <circle cx="100" cy="100" r="55" fill="none" stroke="#C9A227" stroke-width="1" stroke-opacity="0.2" stroke-dasharray="4 6"/>
  <!-- Central synthesis node -->
  <circle cx="100" cy="100" r="8" fill="#C9A227" opacity="0.9"/>
  <circle cx="100" cy="100" r="14" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-opacity="0.5"/>
  <!-- Label -->
  <text x="100" y="186" font-family="Georgia, serif" font-size="11" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">THE COUNCIL</text>
</svg>
