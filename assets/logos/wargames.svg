<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="wgGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="wgGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <g filter="url(#wgGlow)">
    <!-- Chess board grid (strategic wargaming) -->
    <g opacity="0.25">
      <rect x="40" y="50" width="15" height="15" fill="#C9A227"/>
      <rect x="70" y="50" width="15" height="15" fill="#C9A227"/>
      <rect x="100" y="50" width="15" height="15" fill="#C9A227"/>
      <rect x="130" y="50" width="15" height="15" fill="#C9A227"/>
      <rect x="55" y="65" width="15" height="15" fill="#C9A227"/>
      <rect x="85" y="65" width="15" height="15" fill="#C9A227"/>
      <rect x="115" y="65" width="15" height="15" fill="#C9A227"/>
      <rect x="145" y="65" width="15" height="15" fill="#C9A227"/>
      <rect x="40" y="80" width="15" height="15" fill="#C9A227"/>
      <rect x="70" y="80" width="15" height="15" fill="#C9A227"/>
      <rect x="100" y="80" width="15" height="15" fill="#C9A227"/>
      <rect x="130" y="80" width="15" height="15" fill="#C9A227"/>
      <rect x="55" y="95" width="15" height="15" fill="#C9A227"/>
      <rect x="85" y="95" width="15" height="15" fill="#C9A227"/>
      <rect x="115" y="95" width="15" height="15" fill="#C9A227"/>
      <rect x="145" y="95" width="15" height="15" fill="#C9A227"/>
    </g>
    <!-- Board border -->
    <rect x="38" y="48" width="124" height="64" fill="none" stroke="url(#wgGold)" stroke-width="1.5" opacity="0.5"/>
    <!-- Chess king piece (golden, strategy) -->
    <g transform="translate(90, 22)">
      <!-- Cross on top -->
      <line x1="10" y1="0" x2="10" y2="8" stroke="#E8C840" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
      <line x1="6" y1="3" x2="14" y2="3" stroke="#E8C840" stroke-width="2" opacity="0.8" stroke-linecap="round"/>
      <!-- Crown -->
      <path d="M4 12 Q4 8 10 8 Q16 8 16 12" fill="none" stroke="url(#wgGold)" stroke-width="1.5" opacity="0.7"/>
      <!-- Body -->
      <path d="M4 12 L3 24 L17 24 L16 12" fill="none" stroke="url(#wgGold)" stroke-width="1.5" opacity="0.7"/>
      <!-- Base -->
      <rect x="1" y="24" width="18" height="4" rx="2" fill="url(#wgGold)" opacity="0.6"/>
    </g>
    <!-- Strategic arrows on board -->
    <path d="M50 58 L75 73 L105 58" fill="none" stroke="#E8C840" stroke-width="1.2" opacity="0.5" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 3"/>
    <path d="M135 58 L120 88 L140 100" fill="none" stroke="#A07B1A" stroke-width="1.2" opacity="0.35" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 3"/>
    <!-- Opponent piece (smaller, darker) -->
    <circle cx="142" cy="58" r="5" fill="none" stroke="#A07B1A" stroke-width="1.5" opacity="0.4"/>
    <circle cx="142" cy="58" r="2" fill="#A07B1A" opacity="0.3"/>
    <!-- Capture zones -->
    <rect x="85" y="95" width="15" height="15" fill="#A07B1A" opacity="0.08" rx="2"/>
    <rect x="115" y="80" width="15" height="15" fill="#C9A227" opacity="0.08" rx="2"/>
  </g>
  <text x="100" y="138" font-family="Georgia, serif" font-size="11" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">WAR GAMES</text>
</svg>
