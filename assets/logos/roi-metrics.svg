<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="roiGold" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#A07B1A"/>
      <stop offset="100%" stop-color="#E8C840"/>
    </linearGradient>
    <filter id="roiGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="roiBg" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#E8C840" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#E8C840" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <circle cx="100" cy="90" r="65" fill="url(#roiBg)"/>
  <g filter="url(#roiGlow)">
    <!-- Chart frame -->
    <line x1="40" y1="40" x2="40" y2="140" stroke="#C9A227" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="140" x2="165" y2="140" stroke="#C9A227" stroke-width="1.5" opacity="0.5"/>
    <!-- Grid lines -->
    <line x1="40" y1="115" x2="165" y2="115" stroke="#C9A227" stroke-width="0.4" opacity="0.15"/>
    <line x1="40" y1="90" x2="165" y2="90" stroke="#C9A227" stroke-width="0.4" opacity="0.15"/>
    <line x1="40" y1="65" x2="165" y2="65" stroke="#C9A227" stroke-width="0.4" opacity="0.15"/>
    <!-- Bar chart -->
    <rect x="52" y="108" width="14" height="32" rx="2" fill="url(#roiGold)" opacity="0.5"/>
    <rect x="72" y="92" width="14" height="48" rx="2" fill="url(#roiGold)" opacity="0.6"/>
    <rect x="92" y="78" width="14" height="62" rx="2" fill="url(#roiGold)" opacity="0.7"/>
    <rect x="112" y="62" width="14" height="78" rx="2" fill="url(#roiGold)" opacity="0.8"/>
    <rect x="132" y="48" width="14" height="92" rx="2" fill="url(#roiGold)" opacity="0.9"/>
    <!-- Trend line -->
    <polyline points="59,105 79,88 99,74 119,58 139,44" fill="none" stroke="#E8C840" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <!-- Trend dots -->
    <circle cx="59" cy="105" r="3" fill="#E8C840" opacity="0.8"/>
    <circle cx="79" cy="88" r="3" fill="#E8C840" opacity="0.85"/>
    <circle cx="99" cy="74" r="3" fill="#E8C840" opacity="0.9"/>
    <circle cx="119" cy="58" r="3" fill="#E8C840" opacity="0.95"/>
    <circle cx="139" cy="44" r="3.5" fill="#E8C840"/>
    <!-- Arrow up at end -->
    <path d="M139 44 L139 34 M135 38 L139 34 L143 38" fill="none" stroke="#E8C840" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Label -->
  <text x="100" y="172" font-family="Georgia, serif" font-size="10" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">ROI METRICS</text>
</svg>
