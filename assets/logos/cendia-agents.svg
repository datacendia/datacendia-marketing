<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="caGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="caGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <g filter="url(#caGlow)">
    <!-- Brain outline (cognitive engine) -->
    <path d="M100 40 Q130 40 140 60 Q150 78 142 95 Q148 105 145 118 Q140 132 125 138 Q118 142 108 142 L92 142 Q82 142 75 138 Q60 132 55 118 Q52 105 58 95 Q50 78 60 60 Q70 40 100 40Z" fill="none" stroke="url(#caGold)" stroke-width="2" opacity="0.7"/>
    <!-- Brain center divide -->
    <path d="M100 44 Q98 70 100 90 Q102 115 100 140" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.3"/>
    <!-- Left hemisphere neural connections -->
    <circle cx="75" cy="65" r="4" fill="#C9A227" opacity="0.6"/>
    <circle cx="65" cy="85" r="3.5" fill="#C9A227" opacity="0.55"/>
    <circle cx="70" cy="105" r="3.5" fill="#C9A227" opacity="0.5"/>
    <circle cx="82" cy="120" r="3" fill="#C9A227" opacity="0.45"/>
    <circle cx="85" cy="80" r="3" fill="#C9A227" opacity="0.5"/>
    <line x1="75" y1="65" x2="65" y2="85" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <line x1="75" y1="65" x2="85" y2="80" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <line x1="65" y1="85" x2="70" y2="105" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <line x1="85" y1="80" x2="70" y2="105" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <line x1="70" y1="105" x2="82" y2="120" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <!-- Right hemisphere neural connections -->
    <circle cx="125" cy="65" r="4" fill="#C9A227" opacity="0.6"/>
    <circle cx="135" cy="85" r="3.5" fill="#C9A227" opacity="0.55"/>
    <circle cx="130" cy="105" r="3.5" fill="#C9A227" opacity="0.5"/>
    <circle cx="118" cy="120" r="3" fill="#C9A227" opacity="0.45"/>
    <circle cx="115" cy="80" r="3" fill="#C9A227" opacity="0.5"/>
    <line x1="125" y1="65" x2="135" y2="85" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <line x1="125" y1="65" x2="115" y2="80" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <line x1="135" y1="85" x2="130" y2="105" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <line x1="115" y1="80" x2="130" y2="105" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <line x1="130" y1="105" x2="118" y2="120" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <!-- Cross-hemisphere connections -->
    <line x1="85" y1="80" x2="115" y2="80" stroke="#E8C840" stroke-width="1" opacity="0.4" stroke-dasharray="3 3"/>
    <line x1="75" y1="65" x2="125" y2="65" stroke="#E8C840" stroke-width="1" opacity="0.35" stroke-dasharray="3 3"/>
    <line x1="70" y1="105" x2="130" y2="105" stroke="#E8C840" stroke-width="1" opacity="0.35" stroke-dasharray="3 3"/>
    <!-- Central synthesis point -->
    <circle cx="100" cy="90" r="6" fill="#E8C840" opacity="0.8"/>
    <circle cx="100" cy="90" r="10" fill="none" stroke="#E8C840" stroke-width="0.8" opacity="0.3"/>
  </g>
  <text x="100" y="172" font-family="Georgia, serif" font-size="10" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">CENDIAAGENTS</text>
</svg>
