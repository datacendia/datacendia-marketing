<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="dsGold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="dsGlow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <g filter="url(#dsGlow2)">
    <!-- Crown (sovereignty) atop a data cylinder -->
    <!-- Crown -->
    <path d="M68 55 L72 35 L84 50 L100 28 L116 50 L128 35 L132 55Z" fill="none" stroke="url(#dsGold2)" stroke-width="2" opacity="0.8"/>
    <rect x="68" y="55" width="64" height="8" rx="2" fill="url(#dsGold2)" opacity="0.6"/>
    <!-- Crown jewels -->
    <circle cx="100" cy="34" r="3" fill="#E8C840" opacity="0.9"/>
    <circle cx="84" cy="48" r="2.5" fill="#C9A227" opacity="0.6"/>
    <circle cx="116" cy="48" r="2.5" fill="#C9A227" opacity="0.6"/>
    <!-- Data cylinder below crown -->
    <ellipse cx="100" cy="78" rx="38" ry="10" fill="none" stroke="url(#dsGold2)" stroke-width="1.8" opacity="0.65"/>
    <line x1="62" y1="78" x2="62" y2="130" stroke="url(#dsGold2)" stroke-width="1.8" opacity="0.5"/>
    <line x1="138" y1="78" x2="138" y2="130" stroke="url(#dsGold2)" stroke-width="1.8" opacity="0.5"/>
    <ellipse cx="100" cy="130" rx="38" ry="10" fill="none" stroke="url(#dsGold2)" stroke-width="1.8" opacity="0.6"/>
    <!-- Internal tiers -->
    <ellipse cx="100" cy="95" rx="38" ry="8" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.2"/>
    <ellipse cx="100" cy="112" rx="38" ry="8" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.2"/>
    <!-- Sovereignty boundary (perimeter fence) -->
    <rect x="48" y="24" width="104" height="122" rx="6" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.2" stroke-dasharray="6 4"/>
    <!-- Lock on cylinder -->
    <rect x="94" y="98" width="12" height="10" rx="2" fill="none" stroke="#E8C840" stroke-width="1.5" opacity="0.7"/>
    <path d="M96 98 L96 94 Q96 90 100 90 Q104 90 104 94 L104 98" fill="none" stroke="#E8C840" stroke-width="1.5" opacity="0.7"/>
    <circle cx="100" cy="103" r="1.5" fill="#E8C840" opacity="0.8"/>
  </g>
  <text x="100" y="168" font-family="Georgia, serif" font-size="9" fill="#C9A227" text-anchor="middle" letter-spacing="0.06em" opacity="0.9">DATA SOVEREIGNTY</text>
</svg>
