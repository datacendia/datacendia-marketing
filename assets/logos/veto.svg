<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="vtGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="vtGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="vtBg" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#A07B1A" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#A07B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <circle cx="100" cy="90" r="55" fill="url(#vtBg)"/>
  <g filter="url(#vtGlow)">
    <!-- Octagonal stop sign shape -->
    <polygon points="100,38 132,52 146,84 132,116 100,130 68,116 54,84 68,52" fill="none" stroke="url(#vtGold)" stroke-width="2.5" opacity="0.8"/>
    <polygon points="100,46 128,58 140,84 128,110 100,122 72,110 60,84 72,58" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.25"/>
    <!-- Large X in center (veto/block) -->
    <line x1="78" y1="66" x2="122" y2="102" stroke="#E8C840" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <line x1="122" y1="66" x2="78" y2="102" stroke="#E8C840" stroke-width="4" stroke-linecap="round" opacity="0.85"/>
    <!-- Pulse/alert rings -->
    <circle cx="100" cy="84" r="35" fill="none" stroke="#A07B1A" stroke-width="0.8" opacity="0.2"/>
    <circle cx="100" cy="84" r="45" fill="none" stroke="#A07B1A" stroke-width="0.5" opacity="0.12"/>
    <!-- Binary gate indicators on sides -->
    <text x="44" y="88" font-family="'JetBrains Mono', monospace" font-size="8" fill="#C9A227" opacity="0.35">0</text>
    <text x="154" y="88" font-family="'JetBrains Mono', monospace" font-size="8" fill="#C9A227" opacity="0.35">1</text>
  </g>
  <!-- Label -->
  <text x="100" y="158" font-family="Georgia, serif" font-size="11" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">CENDIAVETO</text>
</svg>
