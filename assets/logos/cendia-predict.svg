<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cpGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="cpGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <g filter="url(#cpGlow)">
    <!-- Telescope / looking forward (foresight) -->
    <!-- Telescope body -->
    <path d="M45 125 L95 68" stroke="url(#cpGold)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <path d="M45 125 L95 68" stroke="#E8C840" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <!-- Eyepiece end -->
    <ellipse cx="42" cy="128" rx="8" ry="5" transform="rotate(-40 42 128)" fill="none" stroke="#C9A227" stroke-width="2" opacity="0.6"/>
    <!-- Objective lens end -->
    <ellipse cx="98" cy="65" rx="12" ry="7" transform="rotate(-40 98 65)" fill="none" stroke="url(#cpGold)" stroke-width="2" opacity="0.75"/>
    <!-- Light cone / vision rays emanating forward -->
    <path d="M108 58 L155 30" stroke="#E8C840" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <path d="M110 62 L162 42" stroke="#E8C840" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
    <path d="M112 68 L168 58" stroke="#E8C840" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <!-- Future branching paths (divergent scenarios) -->
    <circle cx="155" cy="30" r="3" fill="#E8C840" opacity="0.6"/>
    <circle cx="162" cy="42" r="2.5" fill="#C9A227" opacity="0.5"/>
    <circle cx="168" cy="58" r="2.5" fill="#C9A227" opacity="0.45"/>
    <!-- Probability indicators near future points -->
    <text x="160" y="28" font-family="'JetBrains Mono', monospace" font-size="6" fill="#E8C840" opacity="0.5">87%</text>
    <text x="167" y="40" font-family="'JetBrains Mono', monospace" font-size="6" fill="#C9A227" opacity="0.4">64%</text>
    <text x="173" y="56" font-family="'JetBrains Mono', monospace" font-size="6" fill="#C9A227" opacity="0.35">31%</text>
    <!-- Tripod legs -->
    <line x1="42" y1="132" x2="28" y2="155" stroke="#C9A227" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="42" y1="132" x2="48" y2="158" stroke="#C9A227" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <line x1="42" y1="132" x2="60" y2="150" stroke="#C9A227" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <!-- Star field (future) -->
    <circle cx="140" cy="35" r="1" fill="#E8C840" opacity="0.3"/>
    <circle cx="150" cy="52" r="1" fill="#E8C840" opacity="0.25"/>
    <circle cx="170" cy="28" r="1.2" fill="#E8C840" opacity="0.2"/>
    <circle cx="148" cy="68" r="1" fill="#E8C840" opacity="0.2"/>
  </g>
  <text x="100" y="182" font-family="Georgia, serif" font-size="10" fill="#C9A227" text-anchor="middle" letter-spacing="0.06em" opacity="0.9">CENDIAPREDICT</text>
</svg>
