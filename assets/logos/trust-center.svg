<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="tcGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="tcGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <g filter="url(#tcGlow)">
    <!-- Certificate / seal of trust -->
    <!-- Outer circle seal -->
    <circle cx="100" cy="85" r="48" fill="none" stroke="url(#tcGold)" stroke-width="2" opacity="0.7"/>
    <circle cx="100" cy="85" r="44" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.25"/>
    <!-- Notch pattern around seal edge -->
    <circle cx="100" cy="85" r="50" fill="none" stroke="#C9A227" stroke-width="0.5" opacity="0.15" stroke-dasharray="3 5"/>
    <!-- Inner star / verification mark -->
    <polygon points="100,52 107,70 126,70 111,81 117,99 100,88 83,99 89,81 74,70 93,70" fill="none" stroke="url(#tcGold)" stroke-width="1.8" opacity="0.7"/>
    <!-- Checkmark in center -->
    <path d="M88 85 L96 94 L114 74" fill="none" stroke="#E8C840" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <!-- SOC 2 / ISO text arc suggestion -->
    <text x="100" y="120" font-family="'JetBrains Mono', monospace" font-size="6" fill="#C9A227" text-anchor="middle" opacity="0.4" letter-spacing="0.1em">VERIFIED</text>
    <!-- Ribbon tails -->
    <path d="M70 128 L78 135 L70 155" fill="none" stroke="url(#tcGold)" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M78 135 L86 128" fill="none" stroke="url(#tcGold)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <path d="M130 128 L122 135 L130 155" fill="none" stroke="url(#tcGold)" stroke-width="2" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M122 135 L114 128" fill="none" stroke="url(#tcGold)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
  </g>
  <text x="100" y="178" font-family="Georgia, serif" font-size="10" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">TRUST CENTER</text>
</svg>
