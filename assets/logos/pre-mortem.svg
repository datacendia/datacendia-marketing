<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="pmGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="pmGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="pmBg" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#A07B1A" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#A07B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <circle cx="100" cy="90" r="65" fill="url(#pmBg)"/>
  <g filter="url(#pmGlow)">
    <!-- Crystal ball / looking glass -->
    <circle cx="100" cy="82" r="40" fill="none" stroke="url(#pmGold)" stroke-width="2" opacity="0.7"/>
    <circle cx="100" cy="82" r="36" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.2"/>
    <!-- Crack/fracture lines inside (showing failure) -->
    <path d="M100 50 L96 65 L102 72 L94 82 L100 90 L92 102 L98 115" fill="none" stroke="#A07B1A" stroke-width="1.5" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M96 65 L88 70" fill="none" stroke="#A07B1A" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
    <path d="M102 72 L110 68" fill="none" stroke="#A07B1A" stroke-width="1" opacity="0.35" stroke-linecap="round"/>
    <path d="M94 82 L86 86" fill="none" stroke="#A07B1A" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <path d="M100 90 L108 94" fill="none" stroke="#A07B1A" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <!-- Warning triangle at center of ball -->
    <path d="M92 90 L100 76 L108 90Z" fill="none" stroke="#E8C840" stroke-width="1.5" opacity="0.7"/>
    <line x1="100" y1="80" x2="100" y2="86" stroke="#E8C840" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
    <circle cx="100" cy="88" r="1" fill="#E8C840" opacity="0.7"/>
    <!-- Glass highlight -->
    <path d="M78 62 Q82 55 90 52" fill="none" stroke="#E8C840" stroke-width="1.5" opacity="0.12" stroke-linecap="round"/>
    <!-- Base/pedestal -->
    <path d="M85 120 Q85 128 92 130 L108 130 Q115 128 115 120" fill="none" stroke="url(#pmGold)" stroke-width="1.5" opacity="0.6"/>
    <rect x="82" y="130" width="36" height="5" rx="2" fill="url(#pmGold)" opacity="0.5"/>
    <!-- Stand -->
    <line x1="100" y1="122" x2="100" y2="130" stroke="#C9A227" stroke-width="2" opacity="0.5"/>
    <line x1="92" y1="122" x2="108" y2="122" stroke="#C9A227" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Label -->
  <text x="100" y="160" font-family="Georgia, serif" font-size="10" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">PRE-MORTEM</text>
</svg>
