<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="mrcGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <linearGradient id="mrcGoldH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="mrcGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="mrcBg" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <circle cx="100" cy="95" r="65" fill="url(#mrcBg)"/>
  <g filter="url(#mrcGlow)">
    <!-- Coil 1 (left) â€” spring/helix shape -->
    <g fill="none" stroke="url(#mrcGold)" stroke-width="2.2" stroke-linecap="round">
      <ellipse cx="60" cy="68" rx="22" ry="8" opacity="0.5"/>
      <ellipse cx="60" cy="78" rx="22" ry="8" opacity="0.6"/>
      <ellipse cx="60" cy="88" rx="22" ry="8" opacity="0.7"/>
      <ellipse cx="60" cy="98" rx="22" ry="8" opacity="0.8"/>
      <ellipse cx="60" cy="108" rx="22" ry="8" opacity="0.9"/>
      <ellipse cx="60" cy="118" rx="22" ry="8"/>
    </g>
    <!-- Connection bar leftâ†’center -->
    <path d="M82 93 Q90 85 100 78" fill="none" stroke="#C9A227" stroke-width="2" opacity="0.6"/>
    <path d="M82 93 Q90 100 100 108" fill="none" stroke="#C9A227" stroke-width="2" opacity="0.6"/>
    <!-- Coil 2 (center-top) â€” spring -->
    <g fill="none" stroke="url(#mrcGold)" stroke-width="2.2" stroke-linecap="round">
      <ellipse cx="100" cy="40" rx="22" ry="8" opacity="0.5"/>
      <ellipse cx="100" cy="50" rx="22" ry="8" opacity="0.6"/>
      <ellipse cx="100" cy="60" rx="22" ry="8" opacity="0.7"/>
      <ellipse cx="100" cy="70" rx="22" ry="8" opacity="0.8"/>
      <ellipse cx="100" cy="80" rx="22" ry="8" opacity="0.9"/>
      <ellipse cx="100" cy="90" rx="22" ry="8"/>
    </g>
    <!-- Connection bar centerâ†’right -->
    <path d="M122 78 Q130 85 140 93" fill="none" stroke="#C9A227" stroke-width="2" opacity="0.6"/>
    <path d="M122 78 Q118 88 118 98" fill="none" stroke="#C9A227" stroke-width="2" opacity="0.5"/>
    <!-- Coil 3 (right) â€” spring -->
    <g fill="none" stroke="url(#mrcGold)" stroke-width="2.2" stroke-linecap="round">
      <ellipse cx="140" cy="68" rx="22" ry="8" opacity="0.5"/>
      <ellipse cx="140" cy="78" rx="22" ry="8" opacity="0.6"/>
      <ellipse cx="140" cy="88" rx="22" ry="8" opacity="0.7"/>
      <ellipse cx="140" cy="98" rx="22" ry="8" opacity="0.8"/>
      <ellipse cx="140" cy="108" rx="22" ry="8" opacity="0.9"/>
      <ellipse cx="140" cy="118" rx="22" ry="8"/>
    </g>
    <!-- Chain link connectors (interlocking nodes) -->
    <circle cx="82" cy="93" r="4" fill="#C9A227" opacity="0.8"/>
    <circle cx="118" cy="93" r="4" fill="#C9A227" opacity="0.8"/>
    <circle cx="100" cy="78" r="3.5" fill="#E8C840" opacity="0.7"/>
  </g>
  <!-- Subtle industrial frame -->
  <rect x="28" y="28" width="144" height="130" rx="6" fill="none" stroke="#C9A227" stroke-width="0.5" opacity="0.12"/>
  <!-- Label -->
  <text x="100" y="175" font-family="Georgia, serif" font-size="11" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">MRC</text>
  <text x="100" y="190" font-family="Georgia, serif" font-size="7" fill="#C9A227" text-anchor="middle" letter-spacing="0.1em" opacity="0.6">THE INTEGRITY LINK</text>
</svg>
