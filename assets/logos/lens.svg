<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="lnGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="lnGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="lnCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0.15"/>
      <stop offset="60%" stop-color="#C9A227" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <g filter="url(#lnGlow)">
    <!-- Outer lens ring -->
    <circle cx="92" cy="85" r="48" fill="none" stroke="url(#lnGold)" stroke-width="2.5" opacity="0.8"/>
    <circle cx="92" cy="85" r="42" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.25"/>
    <!-- Lens glass fill -->
    <circle cx="92" cy="85" r="40" fill="url(#lnCenter)"/>
    <!-- Iris/aperture blades (interpretability layers) -->
    <path d="M92 45 Q108 55 115 70" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.35"/>
    <path d="M130 75 Q125 95 115 105" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.35"/>
    <path d="M115 115 Q100 120 85 115" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.35"/>
    <path d="M60 105 Q55 90 60 75" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.35"/>
    <path d="M65 60 Q78 50 92 48" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.35"/>
    <!-- Inner focus rings -->
    <circle cx="92" cy="85" r="20" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.3"/>
    <circle cx="92" cy="85" r="10" fill="none" stroke="#E8C840" stroke-width="1.2" opacity="0.5"/>
    <!-- Center pupil -->
    <circle cx="92" cy="85" r="5" fill="#E8C840" opacity="0.8"/>
    <!-- Neural network pattern visible through lens -->
    <circle cx="82" cy="72" r="2" fill="#C9A227" opacity="0.4"/>
    <circle cx="102" cy="72" r="2" fill="#C9A227" opacity="0.4"/>
    <circle cx="78" cy="90" r="2" fill="#C9A227" opacity="0.4"/>
    <circle cx="106" cy="90" r="2" fill="#C9A227" opacity="0.4"/>
    <circle cx="85" cy="104" r="2" fill="#C9A227" opacity="0.4"/>
    <circle cx="100" cy="104" r="2" fill="#C9A227" opacity="0.4"/>
    <line x1="82" y1="72" x2="92" y2="85" stroke="#C9A227" stroke-width="0.5" opacity="0.25"/>
    <line x1="102" y1="72" x2="92" y2="85" stroke="#C9A227" stroke-width="0.5" opacity="0.25"/>
    <line x1="78" y1="90" x2="92" y2="85" stroke="#C9A227" stroke-width="0.5" opacity="0.25"/>
    <line x1="106" y1="90" x2="92" y2="85" stroke="#C9A227" stroke-width="0.5" opacity="0.25"/>
    <line x1="85" y1="104" x2="92" y2="85" stroke="#C9A227" stroke-width="0.5" opacity="0.25"/>
    <line x1="100" y1="104" x2="92" y2="85" stroke="#C9A227" stroke-width="0.5" opacity="0.25"/>
    <!-- Handle -->
    <line x1="126" y1="120" x2="155" y2="148" stroke="url(#lnGold)" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <line x1="126" y1="120" x2="155" y2="148" stroke="#E8C840" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    <!-- Glass highlight -->
    <path d="M72 62 Q78 55 88 52" fill="none" stroke="#E8C840" stroke-width="1.5" opacity="0.1" stroke-linecap="round"/>
  </g>
  <!-- Label -->
  <text x="100" y="178" font-family="Georgia, serif" font-size="11" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">CENDIALENS</text>
</svg>
