<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="apGold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="apGlow2">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="apBg2" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#A07B1A" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#A07B1A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <circle cx="100" cy="90" r="65" fill="url(#apBg2)"/>
  <g filter="url(#apGlow2)">
    <!-- Phoenix rising shape — abstract wings and flame -->
    <!-- Left wing -->
    <path d="M100 90 Q80 70 55 50 Q45 65 52 82 Q58 95 70 100 Q80 104 95 98" fill="none" stroke="url(#apGold2)" stroke-width="2" opacity="0.8"/>
    <path d="M100 90 Q75 75 42 62 Q38 78 48 92 Q55 102 68 106" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.4"/>
    <path d="M55 50 Q48 42 40 38" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
    <!-- Right wing -->
    <path d="M100 90 Q120 70 145 50 Q155 65 148 82 Q142 95 130 100 Q120 104 105 98" fill="none" stroke="url(#apGold2)" stroke-width="2" opacity="0.8"/>
    <path d="M100 90 Q125 75 158 62 Q162 78 152 92 Q145 102 132 106" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.4"/>
    <path d="M145 50 Q152 42 160 38" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
    <!-- Body / rising flame -->
    <path d="M96 100 Q94 120 96 138 Q98 145 100 148 Q102 145 104 138 Q106 120 104 100" fill="url(#apGold2)" opacity="0.6"/>
    <!-- Head -->
    <circle cx="100" cy="82" r="6" fill="#E8C840" opacity="0.9"/>
    <circle cx="100" cy="82" r="10" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.4"/>
    <!-- Rising flames/sparks above -->
    <line x1="100" y1="72" x2="100" y2="45" stroke="#E8C840" stroke-width="1.5" opacity="0.6" stroke-linecap="round"/>
    <line x1="94" y1="68" x2="90" y2="50" stroke="#C9A227" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <line x1="106" y1="68" x2="110" y2="50" stroke="#C9A227" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
    <!-- Ascending particles -->
    <circle cx="100" cy="40" r="2" fill="#E8C840" opacity="0.7"/>
    <circle cx="92" cy="46" r="1.5" fill="#C9A227" opacity="0.5"/>
    <circle cx="108" cy="46" r="1.5" fill="#C9A227" opacity="0.5"/>
    <circle cx="100" cy="32" r="1.2" fill="#E8C840" opacity="0.4"/>
    <!-- Red team attack indicators (small x marks around) -->
    <g stroke="#A07B1A" stroke-width="1" opacity="0.35" stroke-linecap="round">
      <line x1="36" y1="88" x2="42" y2="94"/>
      <line x1="42" y1="88" x2="36" y2="94"/>
      <line x1="158" y1="88" x2="164" y2="94"/>
      <line x1="164" y1="88" x2="158" y2="94"/>
      <line x1="60" y1="118" x2="66" y2="124"/>
      <line x1="66" y1="118" x2="60" y2="124"/>
      <line x1="134" y1="118" x2="140" y2="124"/>
      <line x1="140" y1="118" x2="134" y2="124"/>
    </g>
  </g>
  <!-- Label -->
  <text x="100" y="174" font-family="Georgia, serif" font-size="9" fill="#C9A227" text-anchor="middle" letter-spacing="0.06em" opacity="0.9">CENDIAAPOTHEOSIS</text>
</svg>
