<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="otGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="otGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="otBg" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <circle cx="100" cy="95" r="65" fill="url(#otBg)"/>
  <g filter="url(#otGlow)">
    <!-- Globe outline -->
    <circle cx="100" cy="90" r="50" fill="none" stroke="#C9A227" stroke-width="1.8" opacity="0.7"/>
    <!-- Latitude lines -->
    <ellipse cx="100" cy="90" rx="50" ry="18" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <ellipse cx="100" cy="90" rx="50" ry="36" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.25"/>
    <!-- Longitude lines -->
    <ellipse cx="100" cy="90" rx="18" ry="50" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <ellipse cx="100" cy="90" rx="36" ry="50" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.25"/>
    <!-- Vertical meridian -->
    <line x1="100" y1="40" x2="100" y2="140" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <!-- Horizontal equator -->
    <line x1="50" y1="90" x2="150" y2="90" stroke="#C9A227" stroke-width="0.8" opacity="0.3"/>
    <!-- Language script samples orbiting -->
    <text x="100" y="56" font-family="Georgia, serif" font-size="9" fill="#E8C840" text-anchor="middle" opacity="0.8">EN</text>
    <text x="142" y="72" font-family="Georgia, serif" font-size="8" fill="#C9A227" text-anchor="middle" opacity="0.65">日</text>
    <text x="148" y="96" font-family="Georgia, serif" font-size="8" fill="#C9A227" text-anchor="middle" opacity="0.6">ع</text>
    <text x="136" y="120" font-family="Georgia, serif" font-size="8" fill="#C9A227" text-anchor="middle" opacity="0.55">한</text>
    <text x="100" y="134" font-family="Georgia, serif" font-size="8" fill="#C9A227" text-anchor="middle" opacity="0.5">中</text>
    <text x="64" y="120" font-family="Georgia, serif" font-size="8" fill="#C9A227" text-anchor="middle" opacity="0.55">ES</text>
    <text x="52" y="96" font-family="Georgia, serif" font-size="8" fill="#C9A227" text-anchor="middle" opacity="0.6">हि</text>
    <text x="58" y="72" font-family="Georgia, serif" font-size="8" fill="#C9A227" text-anchor="middle" opacity="0.65">PT</text>
    <!-- Translation arrows circling -->
    <path d="M120 48 Q135 42 140 55" fill="none" stroke="#E8C840" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
    <path d="M80 48 Q65 42 60 55" fill="none" stroke="#E8C840" stroke-width="1.2" opacity="0.5" stroke-linecap="round"/>
    <!-- Center node -->
    <circle cx="100" cy="90" r="6" fill="#C9A227" opacity="0.85"/>
    <circle cx="100" cy="90" r="10" fill="none" stroke="#C9A227" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Label -->
  <text x="100" y="162" font-family="Georgia, serif" font-size="9" fill="#C9A227" text-anchor="middle" letter-spacing="0.05em" opacity="0.9">CENDIAOMNITRANSLATE</text>
</svg>
