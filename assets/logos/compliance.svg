<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="coGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="coGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <g filter="url(#coGlow)">
    <!-- Clipboard / checklist -->
    <rect x="55" y="30" width="90" height="120" rx="6" fill="none" stroke="url(#coGold)" stroke-width="2" opacity="0.7"/>
    <!-- Clip at top -->
    <rect x="80" y="24" width="40" height="14" rx="4" fill="none" stroke="#C9A227" stroke-width="1.8" opacity="0.6"/>
    <rect x="88" y="22" width="24" height="6" rx="3" fill="#C9A227" opacity="0.5"/>
    <!-- Checklist items -->
    <!-- Item 1 — checked -->
    <rect x="66" y="50" width="12" height="12" rx="2" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.7"/>
    <path d="M69 56 L72 59 L76 53" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <line x1="84" y1="56" x2="132" y2="56" stroke="#C9A227" stroke-width="1" opacity="0.4"/>
    <!-- Item 2 — checked -->
    <rect x="66" y="70" width="12" height="12" rx="2" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.7"/>
    <path d="M69 76 L72 79 L76 73" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <line x1="84" y1="76" x2="128" y2="76" stroke="#C9A227" stroke-width="1" opacity="0.4"/>
    <!-- Item 3 — checked -->
    <rect x="66" y="90" width="12" height="12" rx="2" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.7"/>
    <path d="M69 96 L72 99 L76 93" fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <line x1="84" y1="96" x2="135" y2="96" stroke="#C9A227" stroke-width="1" opacity="0.4"/>
    <!-- Item 4 — in progress -->
    <rect x="66" y="110" width="12" height="12" rx="2" fill="none" stroke="#C9A227" stroke-width="1.5" opacity="0.5"/>
    <line x1="84" y1="116" x2="120" y2="116" stroke="#C9A227" stroke-width="1" opacity="0.3"/>
    <!-- Item 5 — pending -->
    <rect x="66" y="130" width="12" height="12" rx="2" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.3"/>
    <line x1="84" y1="136" x2="126" y2="136" stroke="#C9A227" stroke-width="1" opacity="0.2"/>
    <!-- Framework badges below -->
    <g font-family="'JetBrains Mono', monospace" font-size="6" fill="#C9A227" text-anchor="middle" opacity="0.5">
      <text x="72" y="168">SOC2</text>
      <text x="100" y="168">ISO</text>
      <text x="128" y="168">NIST</text>
    </g>
    <!-- Dividers between badges -->
    <line x1="86" y1="162" x2="86" y2="170" stroke="#C9A227" stroke-width="0.5" opacity="0.2"/>
    <line x1="114" y1="162" x2="114" y2="170" stroke="#C9A227" stroke-width="0.5" opacity="0.2"/>
  </g>
  <text x="100" y="186" font-family="Georgia, serif" font-size="10" fill="#C9A227" text-anchor="middle" letter-spacing="0.08em" opacity="0.9">COMPLIANCE</text>
</svg>
