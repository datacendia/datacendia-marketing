<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="apGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C840"/>
      <stop offset="100%" stop-color="#A07B1A"/>
    </linearGradient>
    <filter id="apGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="apBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C9A227" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#C9A227" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="200" fill="#0a0a0a" rx="16"/>
  <circle cx="100" cy="100" r="70" fill="url(#apBg)"/>
  <!-- Double Helix — Left strand -->
  <g filter="url(#apGlow)">
    <path d="M80 28 Q60 50 80 72 Q100 94 80 116 Q60 138 80 160 Q90 172 95 178"
          fill="none" stroke="url(#apGold)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right strand -->
    <path d="M120 28 Q140 50 120 72 Q100 94 120 116 Q140 138 120 160 Q110 172 105 178"
          fill="none" stroke="url(#apGold)" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- Hash data rungs (blocky rectangles representing SHA-256 bits) -->
  <g fill="#C9A227" opacity="0.75">
    <!-- Rung 1 -->
    <rect x="86" y="36" width="7" height="4" rx="1"/>
    <rect x="95" y="36" width="5" height="4" rx="1"/>
    <rect x="102" y="36" width="8" height="4" rx="1"/>
    <!-- Rung 2 -->
    <rect x="78" y="52" width="6" height="4" rx="1"/>
    <rect x="86" y="52" width="8" height="4" rx="1"/>
    <rect x="96" y="52" width="5" height="4" rx="1"/>
    <rect x="103" y="52" width="7" height="4" rx="1"/>
    <rect x="112" y="52" width="6" height="4" rx="1"/>
    <!-- Rung 3 -->
    <rect x="84" y="68" width="5" height="4" rx="1"/>
    <rect x="91" y="68" width="7" height="4" rx="1"/>
    <rect x="100" y="68" width="6" height="4" rx="1"/>
    <rect x="108" y="68" width="5" height="4" rx="1"/>
    <!-- Rung 4 (center — widest crossing) -->
    <rect x="88" y="86" width="6" height="4" rx="1"/>
    <rect x="96" y="86" width="8" height="4" rx="1"/>
    <rect x="106" y="86" width="6" height="4" rx="1"/>
    <!-- Rung 5 -->
    <rect x="84" y="102" width="7" height="4" rx="1"/>
    <rect x="93" y="102" width="5" height="4" rx="1"/>
    <rect x="100" y="102" width="8" height="4" rx="1"/>
    <rect x="110" y="102" width="5" height="4" rx="1"/>
    <!-- Rung 6 -->
    <rect x="78" y="118" width="5" height="4" rx="1"/>
    <rect x="85" y="118" width="7" height="4" rx="1"/>
    <rect x="94" y="118" width="6" height="4" rx="1"/>
    <rect x="102" y="118" width="8" height="4" rx="1"/>
    <rect x="112" y="118" width="6" height="4" rx="1"/>
    <!-- Rung 7 -->
    <rect x="86" y="134" width="8" height="4" rx="1"/>
    <rect x="96" y="134" width="5" height="4" rx="1"/>
    <rect x="103" y="134" width="7" height="4" rx="1"/>
    <!-- Rung 8 -->
    <rect x="82" y="150" width="6" height="4" rx="1"/>
    <rect x="90" y="150" width="7" height="4" rx="1"/>
    <rect x="99" y="150" width="5" height="4" rx="1"/>
    <rect x="106" y="150" width="8" height="4" rx="1"/>
    <!-- Rung 9 -->
    <rect x="88" y="166" width="5" height="4" rx="1"/>
    <rect x="95" y="166" width="7" height="4" rx="1"/>
    <rect x="104" y="166" width="6" height="4" rx="1"/>
  </g>
  <!-- Label -->
  <text x="100" y="194" font-family="Georgia, serif" font-size="9" fill="#C9A227" text-anchor="middle" letter-spacing="0.06em" opacity="0.9">AUDIT PROVENANCE</text>
</svg>
